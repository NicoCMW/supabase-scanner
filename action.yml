name: "SupaScanner Security Scan"
description: "Run Supabase security scans on PR/push and post results as PR comments"
author: "NicoCMW"

branding:
  icon: "shield"
  color: "green"

inputs:
  supabase-url:
    description: "Supabase project URL"
    required: true
  supabase-anon-key:
    description: "Supabase anon key"
    required: true
  threshold:
    description: "Fail threshold severity: critical, high, or medium. Exits non-zero when findings meet or exceed this level."
    required: false
    default: "high"
  comment-on-pr:
    description: "Post scan results as a PR comment (true/false)"
    required: false
    default: "true"
  github-token:
    description: "GitHub token for posting PR comments. Defaults to the automatic GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}

outputs:
  grade:
    description: "Overall security grade (A-F)"
    value: ${{ steps.scan.outputs.grade }}
  total-findings:
    description: "Total number of findings"
    value: ${{ steps.scan.outputs.total_findings }}
  critical-count:
    description: "Number of critical findings"
    value: ${{ steps.scan.outputs.critical_count }}
  high-count:
    description: "Number of high findings"
    value: ${{ steps.scan.outputs.high_count }}
  threshold-exceeded:
    description: "Whether the threshold was exceeded (true/false)"
    value: ${{ steps.scan.outputs.threshold_exceeded }}
  report-markdown:
    description: "Scan report in markdown format"
    value: ${{ steps.scan.outputs.report_file }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --ignore-scripts --no-audit --no-fund

    - name: Run security scan
      id: scan
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_SUPABASE_URL: ${{ inputs.supabase-url }}
        INPUT_SUPABASE_ANON_KEY: ${{ inputs.supabase-anon-key }}
        INPUT_THRESHOLD: ${{ inputs.threshold }}
      run: node --import=tsx action/scan.mjs

    - name: Post PR comment
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const reportPath = '${{ steps.scan.outputs.report_file }}';
          const report = fs.readFileSync(reportPath, 'utf8');

          const marker = '<!-- supascanner-report -->';
          const body = `${marker}\n${report}`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c => c.body?.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Enforce threshold
      if: steps.scan.outputs.threshold_exceeded == 'true'
      shell: bash
      run: |
        echo "::error::Security scan found findings at or above the '${{ inputs.threshold }}' threshold"
        exit 1
